<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#166638"/>
  <!-- Subtle inner glow ring -->
  <circle cx="256" cy="256" r="256" fill="url(#glow)" opacity="0.3"/>
  <defs>
    <radialGradient id="glow" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#0f4023"/>
    </radialGradient>
  </defs>
  <!-- R letterform — clean, geometric -->
  <text
    x="256"
    y="340"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="260"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-8"
    opacity="0.97"
  >R</text>
  <!-- Small IQ subscript -->
  <text
    x="355"
    y="355"
    font-family="Georgia, serif"
    font-size="88"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    opacity="0.7"
  >IQ</text>
</svg>
